version: '3.8'

services:
  nestjs_redis_test:
    image: redis:alpine
    container_name: test_redis
    ports:
      - '6380:6379' # Different port to avoid conflict with the development environment
    volumes:
      - nestjs_redis_test:/data

networks:
  default:
    name: quanto_vale_be_test

volumes:
  nestjs_redis_test: